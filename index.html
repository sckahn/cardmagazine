<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8" />
<title>AI × Series · Portal</title>

<link rel="stylesheet" href="styles/site.css?v=27" />
</head><body class="portal">

<nav class="site-nav">
  <div class="site-nav-inner">

<section class="portal-hero">

        <span class="spine s-decor s-hide-sm" style="--c1:#2c3e50; --c2:#1a2533; --w:32px; --h:88%;"><span class="s-title">Notes</span></span>

        <a class="spine s-feature s-series" href="series.html?v=28" aria-label="AI × Series 펼치기">

          <span class="s-title-big">AI &times; Series</span>
          <span class="s-cap"></span>

          <span class="s-cap"></span>
          <span class="s-title-big">AI Chronicle</span>
          <span class="s-cap"></span>

      <div class="bookcase-board"></div>

<footer class="site-foot">
