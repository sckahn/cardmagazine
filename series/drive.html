<script>
(function () {
  const book = document.getElementById('flipbook');
  const total = parseInt(book.dataset.total, 10);
  const lastCard = parseInt(book.dataset.lastCard, 10);
  const slides = book.querySelectorAll('.slide');
  const thumbs = book.querySelectorAll('.thumb');
  const cur = document.getElementById('cur');
  const prevBtn = book.querySelector('.prev-btn');
  const nextBtn = book.querySelector('.next-btn');
  const progressFill = book.querySelector('.progress .fill');
  const thumbsDrawer = book.querySelector('.thumbs');
  const thumbsToggle = book.querySelector('.thumbs-toggle');
  const viewport = book.querySelector('.viewport');

  // page-flip overlays
  const flipL = document.createElement('div'); flipL.className = 'page-flip left';
  const flipR = document.createElement('div'); flipR.className = 'page-flip right';
  viewport.appendChild(flipL); viewport.appendChild(flipR);

  function getSlide(i) { return book.querySelector('.slide[data-idx="' + i + '"]'); }

  function mount(el) {
    if (!el || el.querySelector('iframe') || !el.dataset.src) return;
    const ifr = document.createElement('iframe');
    ifr.src = el.dataset.src;
    ifr.loading = 'lazy';
    ifr.setAttribute('scrolling', 'no');
    el.appendChild(ifr);
    applyScale(ifr);
  }
  function unmount(el) {
    if (!el) return;
    const ifr = el.querySelector('iframe'); if (ifr) ifr.remove();
  }
  function applyScale(ifr) {
    const r = viewport.getBoundingClientRect();
    const scale = r.width / 1080;
    ifr.style.transform = 'scale(' + scale + ')';
  }
  function rescaleAll() {
    viewport.querySelectorAll('iframe').forEach(applyScale);
  }
  window.addEventListener('resize', rescaleAll);

  function manageMount(center) {
    slides.forEach(el => {
      const i = parseInt(el.dataset.idx, 10);
      if (!el.dataset.src) return;
      if (Math.abs(i - center) <= 1) mount(el); else unmount(el);
    });
  }

  let idx = 1;
  let animating = false;

  function updateChrome(next) {
    if (next <= lastCard) {
      thumbs.forEach(el => el.classList.toggle('active', parseInt(el.dataset.goto,10) === next));
      cur.textContent = next;
    } else {
      thumbs.forEach(el => el.classList.remove('active'));
      cur.textContent = '—';
    }
    prevBtn.disabled = next === 1;
    nextBtn.disabled = next === total;
    progressFill.style.width = (next / total * 100) + '%';
    const hash = next <= lastCard ? 'card-' + String(next).padStart(2,'0') : 'end';
    history.replaceState(null, '', '#' + hash);
    const active = book.querySelector('.thumb.active');
    if (active) active.scrollIntoView({block: 'nearest', inline: 'center', behavior: 'smooth'});
  }

  function runFlip(forward) {
    const el = forward ? flipR : flipL;
    el.classList.remove('flip-fwd', 'flip-back');
    void el.offsetWidth;
    el.classList.add(forward ? 'flip-fwd' : 'flip-back');
    setTimeout(() => el.classList.remove('flip-fwd', 'flip-back'), 620);
  }

  function go(next, opts) {
    next = Math.max(1, Math.min(total, next));
    if (next === idx || animating) return;
    opts = opts || {};
    const forward = next > idx;
    const out = getSlide(idx);
    const inEl = getSlide(next);
    if (!out || !inEl) return;
    animating = true;
    manageMount(next);

    if (opts.jump) {
      slides.forEach(el => el.classList.remove('active','turning-out','turning-back-out','turning-back-in'));
      inEl.classList.add('active');
      idx = next;
      updateChrome(next);
      animating = false;
      return;
    }

    if (forward) {
      out.classList.add('turning-out');
      out.classList.remove('active');
      // page curl visual
      runFlip(true);
      setTimeout(() => {
        inEl.classList.add('active');
      }, 80);
      setTimeout(() => {
        out.classList.remove('turning-out');
        animating = false;
      }, 620);
    } else {
      out.classList.add('turning-back-out');
      out.classList.remove('active');
      runFlip(false);
      inEl.classList.add('turning-back-in');
      void inEl.offsetWidth;
      setTimeout(() => {
        inEl.classList.remove('turning-back-in');
        inEl.classList.add('active');
      }, 40);
      setTimeout(() => {
        out.classList.remove('turning-back-out');
        animating = false;
      }, 620);
    }
    idx = next;
    updateChrome(next);
  }

  prevBtn.addEventListener('click', () => go(idx - 1));
  nextBtn.addEventListener('click', () => go(idx + 1));
  thumbs.forEach(t => t.addEventListener('click', () => {
    const target = parseInt(t.dataset.goto, 10);
    go(target, { jump: Math.abs(target - idx) > 1 });
  }));
  thumbsToggle.addEventListener('click', () => {
    const open = thumbsDrawer.classList.toggle('open');
    thumbsToggle.setAttribute('aria-expanded', open);
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') go(idx - 1);
    else if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(idx + 1); }
    else if (e.key === 'Home') go(1, { jump: true });
    else if (e.key === 'End') go(total, { jump: true });
  });
  let startX = null;
  viewport.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, {passive:true});
  viewport.addEventListener('touchend', (e) => {
    if (startX === null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) go(dx < 0 ? idx + 1 : idx - 1);
    startX = null;
  });

  manageMount(idx);
  if (location.hash === '#end') go(total, { jump: true });
  else {
    const m = location.hash.match(/#card-(\d+)/);
    if (m) go(parseInt(m[1], 10), { jump: true });
  }
  prevBtn.disabled = idx === 1;
  nextBtn.disabled = idx === total;
})();
</script>
