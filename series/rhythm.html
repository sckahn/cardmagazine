<section class="flipbook" id="flipbook" data-total="9" data-last-card="8">
  <button class="turn prev-btn" aria-label="Previous card">‹</button>
  <div class="viewport" tabindex="0">
      <div class="slide active" data-idx="1"><img src="../7-outputs-rhythm/01-cover.png" alt="Card 1" loading="eager" /></div>
      <div class="slide" data-idx="2"><img src="../7-outputs-rhythm/02-rhythm-vs-groove.png" alt="Card 2" loading="eager" /></div>
      <div class="slide" data-idx="3"><img src="../7-outputs-rhythm/03-ai-music-timeline.png" alt="Card 3" loading="lazy" /></div>
      <div class="slide" data-idx="4"><img src="../7-outputs-rhythm/04-what-ai-does.png" alt="Card 4" loading="lazy" /></div>
      <div class="slide" data-idx="5"><img src="../7-outputs-rhythm/05-theory-vs-feel.png" alt="Card 5" loading="lazy" /></div>
      <div class="slide" data-idx="6"><img src="../7-outputs-rhythm/06-what-ai-misses.png" alt="Card 6" loading="lazy" /></div>
      <div class="slide" data-idx="7"><img src="../7-outputs-rhythm/07-body-language.png" alt="Card 7" loading="lazy" /></div>
      <div class="slide" data-idx="8"><img src="../7-outputs-rhythm/08-outro.png" alt="Card 8" loading="lazy" /></div>
      <div class="slide end-card" data-idx="9">
        <div class="end-card-inner">
          <div class="end-kicker">NEXT · ISSUE 08</div>
          <img class="end-cover" src="../8-outputs-dream/01-cover.png" alt="Dream cover" loading="lazy" />

          <p class="end-sub">뇌가 꿈을 만드는 원리, AI는 꿀 수 있을까</p>
          <a class="end-cta" href="dream.html">다음 이슈 보기 →</a>
        </div>
      </div>
  </div>
  <button class="turn next-btn" aria-label="Next card">›</button>

  <div class="reader-bar">
    <div class="progress"><div class="fill" style="width: 11.11111111111111%"></div></div>
    <div class="meta-row">
      <span>AI × Rhythm</span>
      <span class="counter"><b><span id="cur">1</span></b> <span style="opacity:0.5;">/</span> 08</span>
      <button class="thumbs-toggle" aria-expanded="false" aria-controls="thumbs">목차</button>
    </div>
    <div class="thumbs" id="thumbs" role="tablist" aria-label="Card thumbnails">
    <button class="thumb active" data-goto="1" aria-label="Go to card 1"><img src="../7-outputs-rhythm/01-cover.png" loading="lazy" alt="" /></button>
    <button class="thumb" data-goto="2" aria-label="Go to card 2"><img src="../7-outputs-rhythm/02-rhythm-vs-groove.png" loading="lazy" alt="" /></button>
    <button class="thumb" data-goto="3" aria-label="Go to card 3"><img src="../7-outputs-rhythm/03-ai-music-timeline.png" loading="lazy" alt="" /></button>
    <button class="thumb" data-goto="4" aria-label="Go to card 4"><img src="../7-outputs-rhythm/04-what-ai-does.png" loading="lazy" alt="" /></button>
    <button class="thumb" data-goto="5" aria-label="Go to card 5"><img src="../7-outputs-rhythm/05-theory-vs-feel.png" loading="lazy" alt="" /></button>

</nav>

<script>
(function () {
  const book = document.getElementById('flipbook');
  const total = parseInt(book.dataset.total, 10);       // includes end-card
  const lastCard = parseInt(book.dataset.lastCard, 10); // real cards only
  const slides = book.querySelectorAll('.slide');
  const thumbs = book.querySelectorAll('.thumb');
  const cur = document.getElementById('cur');
  const prevBtn = book.querySelector('.prev-btn');
  const nextBtn = book.querySelector('.next-btn');
  const progressFill = book.querySelector('.progress .fill');
  const thumbsDrawer = book.querySelector('.thumbs');
  const thumbsToggle = book.querySelector('.thumbs-toggle');
  let idx = 1;
  function go(next) {
    next = Math.max(1, Math.min(total, next));
    if (next === idx) return;
    slides.forEach(el => el.classList.toggle('active', parseInt(el.dataset.idx,10) === next));
    if (next <= lastCard) {
      thumbs.forEach(el => el.classList.toggle('active', parseInt(el.dataset.goto,10) === next));
      cur.textContent = next;
    } else {
      thumbs.forEach(el => el.classList.remove('active'));
      cur.textContent = '—';
    }
    prevBtn.disabled = next === 1;
    nextBtn.disabled = next === total;
    progressFill.style.width = (next / total * 100) + '%';
    idx = next;
    const hash = next <= lastCard ? 'card-' + String(next).padStart(2,'0') : 'end';
    history.replaceState(null, '', '#' + hash);
    const active = book.querySelector('.thumb.active');
    if (active) active.scrollIntoView({block: 'nearest', inline: 'center', behavior: 'smooth'});
  }
  prevBtn.addEventListener('click', () => go(idx - 1));
  nextBtn.addEventListener('click', () => go(idx + 1));
  thumbs.forEach(t => t.addEventListener('click', () => go(parseInt(t.dataset.goto, 10))));
  thumbsToggle.addEventListener('click', () => {
    const open = thumbsDrawer.classList.toggle('open');
    thumbsToggle.setAttribute('aria-expanded', open);
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') go(idx - 1);
    else if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(idx + 1); }
    else if (e.key === 'Home') go(1);
    else if (e.key === 'End') go(total);
  });
  let startX = null;
  const vp = book.querySelector('.viewport');
  vp.addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, {passive:true});
  vp.addEventListener('touchend', (e) => {
    if (startX === null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) go(dx < 0 ? idx + 1 : idx - 1);
    startX = null;
  });
  if (location.hash === '#end') go(total);
  else {
    const m = location.hash.match(/#card-(\d+)/);
    if (m) go(parseInt(m[1], 10));
  }
  prevBtn.disabled = idx === 1;
  nextBtn.disabled = idx === total;
})();
</script>

</body></html>
