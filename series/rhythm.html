<script>
(function () {
  const book = document.getElementById('flipbook');
  const total = parseInt(book.dataset.total, 10);
  const slides = book.querySelectorAll('.slide');
  const thumbs = book.querySelectorAll('.thumb');
  const cur = document.getElementById('cur');
  const prevBtn = book.querySelector('.prev-btn');
  const nextBtn = book.querySelector('.next-btn');
  let idx = 1;
  function go(next) {
    next = Math.max(1, Math.min(total, next));
    if (next === idx) return;
    slides.forEach(el => el.classList.toggle('active', parseInt(el.dataset.idx,10) === next));
    thumbs.forEach(el => el.classList.toggle('active', parseInt(el.dataset.goto,10) === next));
    cur.textContent = next;
    prevBtn.disabled = next === 1;
    nextBtn.disabled = next === total;
    idx = next;
    history.replaceState(null, '', '#card-' + String(next).padStart(2,'0'));
    const active = book.querySelector('.thumb.active');
    if (active) active.scrollIntoView({block: 'nearest', inline: 'center', behavior: 'smooth'});
  }
  prevBtn.addEventListener('click', () => go(idx - 1));
  nextBtn.addEventListener('click', () => go(idx + 1));
  thumbs.forEach(t => t.addEventListener('click', () => go(parseInt(t.dataset.goto, 10))));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') go(idx - 1);
    else if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(idx + 1); }
    else if (e.key === 'Home') go(1);
    else if (e.key === 'End') go(total);
  });
  // touch swipe
  let startX = null;
  book.querySelector('.viewport').addEventListener('touchstart', (e) => { startX = e.touches[0].clientX; }, {passive:true});
  book.querySelector('.viewport').addEventListener('touchend', (e) => {
    if (startX === null) return;
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) go(dx < 0 ? idx + 1 : idx - 1);
    startX = null;
  });
  // URL hash
  const m = location.hash.match(/#card-(\d+)/);
  if (m) go(parseInt(m[1], 10));
  prevBtn.disabled = idx === 1;
  nextBtn.disabled = idx === total;
})();
</script>

</body></html>
